name: Deploy Docs Subdomain

on:
  push:
    branches:
      - main
    paths:
      - 'website/**'
      - '.github/workflows/deploy-docs-subdomain.yml'
  workflow_dispatch:

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::862099794180:role/github-docs-deployer-role
          aws-region: ap-southeast-1

      - name: Sync website to S3
        run: |
          aws s3 sync website/ s3://docs-platform-862099794180/ \
            --delete \
            --exclude "*.DS_Store" \
            --exclude "*.md" \
            --cache-control "max-age=300"

      - name: Set longer cache for static assets
        run: |
          aws s3 sync website/resources/ s3://docs-platform-862099794180/resources/ \
            --exclude "*.DS_Store" \
            --cache-control "max-age=86400"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id E3JV2S8SA2TWZM \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "### Deployment Complete 🚀" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed to**: https://d5lpkk46i6ox1.cloudfront.net" >> $GITHUB_STEP_SUMMARY
          echo "**S3 Bucket**: docs-platform-862099794180" >> $GITHUB_STEP_SUMMARY
          echo "**Region**: ap-southeast-1" >> $GITHUB_STEP_SUMMARY
          echo "**CloudFront**: E3JV2S8SA2TWZM" >> $GITHUB_STEP_SUMMARY
