<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guides - Docs Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f0f; color: #e0e0e0; line-height: 1.7; }
    nav { background: #1a1a1a; border-bottom: 1px solid #2a2a2a; padding: 16px 24px; }
    nav a { color: #c8f135; text-decoration: none; margin-right: 24px; }
    .container { max-width: 1200px; margin: 0 auto; padding: 48px 24px; }
    h1 { font-size: 42px; margin-bottom: 16px; color: #fff; }
    .subtitle { color: #aaa; font-size: 18px; margin-bottom: 48px; }
    .guide-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
    .guide-card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 24px; }
    .guide-card h3 { color: #c8f135; margin-bottom: 12px; }
    .guide-card p { color: #aaa; font-size: 14px; }
  </style>
</head>
<body>
  <nav>
    <a href="/">Home</a>
    <a href="/tutorials/">Tutorials</a>
    <a href="/tools/">Tools</a>
    <a href="/guides/">Guides</a>
    <a href="/resources/">Resources</a>
  </nav>

  <div class="container">
    <h1>📚 Guides</h1>
    <p class="subtitle">In-depth documentation for AWS services and best practices</p>

    <div class="guide-grid">
      <div class="guide-card">
        <h3>Coming Soon</h3>
        <p>Comprehensive guides for AWS Bedrock, Lambda, S3, CloudFront, and more.</p>
      </div>
    </div>
  </div>
</body>
</html>
